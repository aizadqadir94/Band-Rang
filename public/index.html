<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Band Rang</title>
<style>
  :root{ --felt:#0f5d4a; --felt-dk:#0a4537; --cream:#f3ead6; --gold:#c9a23f; --ink:#16140f; --red:#d6453a; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; min-height:100vh; font-family:Georgia,'Times New Roman',serif; color:var(--cream);
    background:radial-gradient(circle at 50% 30%, #14201c 0%, #0a120f 70%); display:flex; flex-direction:column;}
  header{display:flex; justify-content:space-between; align-items:center; padding:12px 14px; gap:10px;}
  .brand{display:flex; flex-direction:column; line-height:1;}
  .brand .r{font-size:26px; font-weight:700; font-style:italic; color:var(--gold); letter-spacing:.5px;}
  .brand .s{font-size:9px; letter-spacing:3px; text-transform:uppercase; color:#9bb3a8; margin-top:3px;}
  .scorebar{display:flex; align-items:center; gap:8px;}
  .chip{display:flex; flex-direction:column; align-items:center; padding:4px 11px; border-radius:10px; min-width:58px; border:1px solid rgba(201,162,63,.3);}
  .chip.us{background:rgba(15,93,74,.5);} .chip.them{background:rgba(120,40,40,.35);}
  .chip .lab{font-size:8px; text-transform:uppercase; letter-spacing:1px; color:#9bb3a8;}
  .chip .num{font-size:20px; font-weight:700;}
  .vs{font-size:10px; color:#6c8479; font-style:italic;}
  .wrap{flex:1; display:flex; flex-direction:column; padding:0 12px 16px; max-width:520px; width:100%; margin:0 auto;}

  .lobby{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; text-align:center;}
  .lobby h2{color:var(--gold); font-style:italic; margin:0; font-size:23px;}
  .lobby p{color:#c7d3cb; font-size:14px; line-height:1.6; margin:0; max-width:380px;}
  input{font-family:inherit; font-size:16px; padding:11px 14px; border-radius:10px; border:1px solid #d8cba8; background:var(--cream); color:var(--ink); width:220px; text-align:center;}
  input.code{letter-spacing:6px; text-transform:uppercase; font-weight:700;}
  .btn{background:linear-gradient(180deg,var(--gold),#a8842c); color:#1a1305; border:none; padding:12px 24px; font-size:15px; font-weight:700; border-radius:10px; cursor:pointer; font-family:inherit; letter-spacing:.5px; box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .btn:disabled{opacity:.4; cursor:default;}
  .btn.ghost{background:transparent; color:var(--gold); border:1px solid var(--gold); box-shadow:none;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .or{color:#6c8479; font-size:12px; font-style:italic;}
  .seatlist{display:flex; flex-direction:column; gap:6px;}
  .seatrow{display:flex; align-items:center; gap:8px; font-size:14px; color:#dce7e0;}
  .dot{width:9px; height:9px; border-radius:50%; background:#3a4d45;}
  .dot.on{background:var(--gold);}
  .codebig{font-size:38px; font-weight:700; letter-spacing:10px; color:var(--gold); font-style:italic;}
  .hint{font-size:12px; color:#9bb3a8;}

  .table{position:relative; flex:1; border-radius:22px; min-height:560px; overflow:hidden;
    background:radial-gradient(ellipse at 50% 45%, var(--felt) 0%, var(--felt-dk) 80%);
    border:3px solid #5a3e20; box-shadow:inset 0 0 60px rgba(0,0,0,.45), 0 8px 30px rgba(0,0,0,.5); transition:box-shadow .3s;}
  .table.flash{box-shadow:inset 0 0 80px rgba(201,162,63,.5), 0 8px 30px rgba(0,0,0,.5);}

  .infostack{position:absolute; top:10px; left:12px; display:flex; flex-direction:column; gap:5px; align-items:flex-start; max-width:150px; z-index:6;}
  .roundb{font-size:13px; font-weight:700; color:#1a1305; background:var(--gold); padding:4px 11px; border-radius:14px;}
  .pileb{display:flex; align-items:baseline; gap:5px; background:rgba(120,40,40,.6); padding:4px 12px; border-radius:12px;}
  .pileb .n{font-size:22px; font-weight:700; color:#fff; line-height:1;}
  .pileb .l{font-size:10px; color:#f0d0d0; text-transform:uppercase; letter-spacing:1px;}
  .scorecard{background:rgba(0,0,0,.34); border-radius:12px; padding:6px 10px; display:flex; flex-direction:column; gap:3px; min-width:132px; border:1px solid rgba(201,162,63,.2);}
  .sline{display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .sline .nm{font-size:11px; color:#9bb3a8;} .sline .nu{font-size:16px; font-weight:700;}
  .hintb{font-size:9.5px; color:#d8c7a0; background:rgba(0,0,0,.32); padding:3px 8px; border-radius:10px; font-style:italic; line-height:1.3; max-width:150px;}

  .trumpbadge{position:absolute; top:10px; right:12px; display:flex; align-items:center; gap:6px; background:var(--cream); padding:5px 11px; border-radius:20px; box-shadow:0 2px 8px rgba(0,0,0,.4);}
  .trumpbadge .l{font-size:9px; text-transform:uppercase; letter-spacing:1px; color:#7a6a45; font-weight:700;}
  .trumpbadge .sym{font-size:20px; line-height:1;} .trumpbadge .hid{font-size:12px; color:#7a6a45; font-style:italic;}
  .bidbadge{position:absolute; top:44px; right:12px; font-size:11px; color:#1a1305; background:var(--gold); padding:3px 9px; border-radius:14px; font-weight:700;}

  .seat{position:absolute; display:flex; flex-direction:column; align-items:center; gap:3px; z-index:5;}
  .seat.top{top:8px; left:50%; transform:translateX(-50%);}
  .seat.left{left:8px; top:42%; transform:translateY(-50%);}
  .seat.right{right:8px; top:42%; transform:translateY(-50%);}
  .avatar{width:36px; height:36px; border-radius:50%; background:#2a3833; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700;}
  .seat.active .avatar{animation:pulse 1.2s ease-in-out infinite;}
  .seatname{font-size:11px; color:#dce7e0;} .seat.active .seatname{color:var(--gold);}
  .tag{font-size:9px; color:var(--gold); font-style:italic;}
  .offline{opacity:.45;}

  .felt{position:absolute; inset:80px 70px; border-radius:50%; border:1px dashed rgba(201,162,63,.18); display:flex; align-items:center; justify-content:center;}
  .feltmsg{max-width:200px; text-align:center; font-size:13px; color:#dfe9e3; font-style:italic; line-height:1.4; padding:8px;}

  .played{position:absolute; width:46px; height:64px; background:var(--cream); border-radius:7px; box-shadow:0 3px 10px rgba(0,0,0,.5); display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid #d8cba8;}
  .played.top{top:13%; left:50%; transform:translateX(-50%);}
  .played.bottom{bottom:13%; left:50%; transform:translateX(-50%);}
  .played.left{left:15%; top:50%; transform:translateY(-50%);}
  .played.right{right:15%; top:50%; transform:translateY(-50%);}
  .played .c{font-size:15px; font-weight:700; line-height:1;} .played .p{font-size:20px; line-height:1;}
  .played.back{background:repeating-linear-gradient(45deg,#7a1f1f,#7a1f1f 5px,#5a1414 5px,#5a1414 10px); border:1px solid #3a0e0e; color:#f3d9d9; font-size:10px; font-style:italic;}
  .tdot{position:absolute; top:3px; right:3px; width:7px; height:7px; border-radius:50%; background:var(--gold);}

  .panel{position:absolute; bottom:150px; left:50%; transform:translateX(-50%); background:rgba(10,18,15,.95); padding:12px 16px; border-radius:14px; z-index:20; border:1px solid var(--gold); display:flex; flex-direction:column; align-items:center; gap:8px; box-shadow:0 8px 30px rgba(0,0,0,.6); max-width:320px;}
  .panel .t{font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--gold);}
  .pickcards{display:flex; gap:7px; justify-content:center; flex-wrap:wrap;}
  .pickcard{width:42px; height:58px; background:var(--cream); border:1px solid #d8cba8; border-radius:9px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:inherit;}
  .bidgrid{display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:270px;}
  .bidbtn{width:38px; height:38px; font-size:16px; font-weight:700; background:var(--cream); color:#16140f; border:1px solid #d8cba8; border-radius:9px; cursor:pointer; font-family:inherit;}
  .passbtn{background:transparent; color:#cdbd7f; border:1px solid #6c5a2f; padding:7px 18px; border-radius:9px; cursor:pointer; font-family:inherit; font-size:13px;}

  .handbottom{position:absolute; bottom:8px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:6px; z-index:8;}
  .youtag{font-size:11px; color:var(--gold); letter-spacing:1px; font-style:italic; min-height:15px;}
  .fan{display:flex; justify-content:center; padding-bottom:4px;}
  .card{width:50px; height:72px; background:var(--cream); border-radius:8px; border:1px solid #d8cba8; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.4); padding:0; transition:transform .12s; font-family:inherit;}
  .card .c{font-size:16px; font-weight:700; line-height:1;} .card .p{font-size:21px; line-height:1;}
  .card.playable{box-shadow:0 0 0 2px var(--gold), 0 5px 12px rgba(0,0,0,.5);}
  .card.playable:hover{transform:translateY(-14px);}
  .card.dim{opacity:.45; filter:grayscale(.4); cursor:default;}
  .card.locked{background:var(--cream); border:1px dashed var(--gold); color:#68746e; cursor:default; opacity:.58; filter:grayscale(1); box-shadow:inset 0 0 18px rgba(0,0,0,.18), 0 3px 8px rgba(0,0,0,.25);}
  .card.locked .c{font-size:16px; font-weight:700; line-height:1;}
  .card.locked .p{font-size:21px; line-height:1;}
  .card.locked .small{font-size:7px; font-style:italic; margin-top:3px; color:#69746e;}
  .boardreset{position:absolute;right:12px;bottom:104px;z-index:29;background:rgba(10,18,15,.72);color:var(--gold);border:1px solid rgba(201,162,63,.55);border-radius:999px;padding:7px 12px;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 5px 18px rgba(0,0,0,.35);}
  .boardreset:active{transform:translateY(1px);}

  .overlay{position:absolute; inset:0; background:rgba(5,10,8,.84); display:flex; align-items:center; justify-content:center; z-index:30; border-radius:22px;}
  .ocard{background:#14201c; border:1px solid var(--gold); border-radius:16px; padding:26px 24px; text-align:center; max-width:340px; display:flex; flex-direction:column; gap:12px;}
  .ocard .t{font-size:17px; color:var(--gold); font-style:italic; line-height:1.4;}
  .ocard .sc{font-size:13px; color:#c7d3cb;}
  .toast{position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#7a1f1f; color:#fff; padding:10px 18px; border-radius:10px; font-size:14px; z-index:50; opacity:0; transition:opacity .25s; pointer-events:none; max-width:80%; text-align:center;}
  .toast.show{opacity:1;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,162,63,.5);}50%{box-shadow:0 0 0 7px rgba(201,162,63,0);}}
  @media (prefers-reduced-motion:reduce){.avatar{animation:none!important;}}
  button:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .red{color:var(--red);} .black{color:var(--ink);}

  .seat.bottom{bottom:86px; left:50%; transform:translateX(-50%);}
  .spectatorbox{position:absolute; bottom:22px; left:50%; transform:translateX(-50%); color:#dce7e0; background:rgba(0,0,0,.35); border:1px solid rgba(201,162,63,.28); border-radius:14px; padding:8px 12px; font-size:13px; text-align:center; z-index:8;}
  .skipgrid{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:12px 0;}
  .skipcard{background:rgba(0,0,0,.28); border:1px solid rgba(201,162,63,.25); border-radius:14px; padding:10px; min-width:125px; min-height:84px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; overflow:hidden;}
  .skipname{font-size:12px; color:#dce7e0;}
  .skipcount{font-size:10px; color:#9bb3a8;}
  .skipbtn{position:relative; transition:transform .14s ease; white-space:nowrap; padding:10px 12px; font-size:12px;}
  .skipdone{color:var(--gold); font-weight:700;}


  .trumpreveal{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:40;border-radius:22px;animation:fadeReveal 2s ease forwards;pointer-events:none;}
  .trumprevealbox{display:flex;flex-direction:column;align-items:center;gap:12px;transform:scale(.9);animation:popReveal 2s ease forwards;}
  .revealtext{font-size:24px;color:var(--gold);font-style:italic;text-shadow:0 3px 12px #000;}
  .bigcard{width:132px;height:184px;background:var(--cream);border:2px solid #d8cba8;border-radius:16px;box-shadow:0 16px 50px rgba(0,0,0,.75),0 0 0 4px rgba(201,162,63,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .bigcard .c{font-size:48px;font-weight:800;line-height:1;}.bigcard .p{font-size:66px;line-height:1;}
  @keyframes popReveal{0%{transform:scale(.35) rotate(-8deg);opacity:0}15%{transform:scale(1.08) rotate(2deg);opacity:1}30%,75%{transform:scale(1) rotate(0);opacity:1}100%{transform:scale(.92);opacity:0}}
  @keyframes fadeReveal{0%,78%{opacity:1}100%{opacity:0}}
  .overlay.handover{background:rgba(5,10,8,.62);align-items:center;justify-content:center;padding:12px;}
  .lossstage{position:relative;width:100%;max-width:460px;min-height:520px;border:2px solid var(--gold);border-radius:18px;background-size:cover;background-position:center;overflow:hidden;box-shadow:inset 0 0 90px rgba(0,0,0,.55),0 8px 30px rgba(0,0,0,.55);display:flex;flex-direction:column;justify-content:space-between;padding:24px 18px 20px;}
  .lossstage:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.20),rgba(0,0,0,.05) 42%,rgba(0,0,0,.62));pointer-events:none;}
  .losstop,.lossbuttons,.lossactions{position:relative;z-index:2;}
  .losstitle{font-size:26px;line-height:1.15;color:#fff;font-style:italic;font-weight:700;text-shadow:0 3px 12px #000;text-align:center;}
  .losssub{font-size:21px;line-height:1.25;color:#fff;font-style:italic;font-weight:700;text-shadow:0 3px 12px #000;text-align:center;margin-top:3px;}
  .lossbuttons{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:center;justify-items:center;min-height:230px;margin-top:22px;}
  .lossslot{position:relative;min-height:145px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:visible;}
  .lossbtn{min-width:138px;padding:14px 18px;font-size:17px;border-radius:12px;transition:transform .12s ease;white-space:nowrap;}
  .lossbtn.done{background:linear-gradient(180deg,#d6bd68,#9c7a25);}
  .lossname{margin-top:10px;font-size:16px;color:#fff;text-shadow:0 3px 8px #000;text-align:center;font-weight:700;}
  .losstaps{margin-top:5px;font-size:12px;color:#f3ead6;text-shadow:0 2px 7px #000;background:rgba(0,0,0,.35);border-radius:10px;padding:3px 8px;}
  .lossactions{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;align-items:center;margin-top:20px;}
  .lossactions .btn{min-height:74px;font-size:19px;border-radius:14px;background:linear-gradient(180deg,rgba(201,162,63,.92),rgba(151,118,38,.92));}
  .lossactions .btn.ghost{background:rgba(0,0,0,.25);color:var(--gold);border:1px solid var(--gold);}
  @media(max-width:420px){.lossstage{min-height:500px;padding:22px 14px 18px}.losssub{font-size:19px}.lossbtn{min-width:124px;font-size:16px}.lossactions .btn{font-size:17px;min-height:68px}}

</style>
</head>
<body>
<header>
  <div class="brand"><span class="r">Band Rang</span><span class="s">Hidden Trump &middot; Online</span></div>
  <div class="scorebar" id="scorebar" style="visibility:hidden">
    <div class="chip us"><span class="lab" id="lab0">Net &middot; you</span><span class="num" id="s0">0</span></div>
    <div class="vs">vs</div>
    <div class="chip them"><span class="lab" id="lab1">Net &middot; opp</span><span class="num" id="s1">0</span></div>
  </div>
</header>
<div class="wrap" id="wrap"></div>
<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
