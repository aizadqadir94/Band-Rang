<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a120f">
<title>Band Rang</title>
<style>
  :root {
    --felt:#0f5d4a; --felt-dk:#0a4537; --cream:#f3ead6; --gold:#c9a23f; --ink:#16140f;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:#0a120f; color:var(--cream);
    font-family:'Palatino Linotype','Palatino','Georgia','Times New Roman',serif; }
  #app { min-height:100vh; display:flex; flex-direction:column; }
  button { font-family:inherit; cursor:pointer; }
  .hidden { display:none !important; }

  /* ---------- lobby ---------- */
  .lobby { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:28px 20px; text-align:center; max-width:440px; margin:0 auto; }
  .lobby h1 { font-size:40px; color:var(--gold); font-style:italic; margin:0; letter-spacing:1px;
    text-shadow:0 3px 10px rgba(0,0,0,.5); }
  .lobby p { font-size:16px; color:#cdd9d0; line-height:1.6; margin:0; }
  .field { width:100%; max-width:320px; display:flex; flex-direction:column; gap:6px; text-align:left; }
  .field label { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:#8fa89d;
    font-family:'Helvetica Neue',sans-serif; }
  .field input { padding:13px 14px; font-size:16px; border-radius:11px; border:1px solid #3a4d45;
    background:rgba(255,255,255,.05); color:var(--cream); font-family:inherit; }
  .field input:focus { outline:2px solid var(--gold); }
  .primary { background:linear-gradient(180deg,#e8c45f,#a8842c); color:#1a1305; border:none;
    padding:14px 28px; font-size:16px; font-weight:700; border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    letter-spacing:.6px; font-family:'Helvetica Neue',sans-serif; width:100%; max-width:320px; }
  .ghost { background:rgba(201,162,63,.08); color:var(--gold); border:1px solid var(--gold);
    padding:12px 22px; font-size:14px; font-weight:700; border-radius:12px;
    font-family:'Helvetica Neue',sans-serif; width:100%; max-width:320px; }
  .divider { display:flex; align-items:center; gap:12px; width:100%; max-width:320px; color:#6c8479; font-size:12px; }
  .divider:before,.divider:after { content:""; flex:1; height:1px; background:#2a3a34; }
  .err { color:#e88; font-size:13px; min-height:18px; }
  .codebox { font-size:30px; letter-spacing:6px; color:var(--gold); font-weight:700; }

  /* ---------- table ---------- */
  .topbar { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; gap:10px; }
  .brand { font-size:22px; color:var(--gold); font-style:italic; font-weight:700; }
  .roomtag { font-size:12px; color:#8fa89d; font-family:'Helvetica Neue',sans-serif; letter-spacing:1px; }
  .scorebar { display:flex; gap:8px; align-items:center; }
  .chip { display:flex; flex-direction:column; align-items:center; padding:5px 12px; border-radius:11px;
    min-width:56px; border:1px solid rgba(201,162,63,.3); }
  .chip .lbl { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:#9bb3a8; font-family:'Helvetica Neue',sans-serif; }
  .chip .num { font-size:22px; font-weight:700; }
  .chip.us { background:linear-gradient(180deg,rgba(15,93,74,.55),rgba(15,93,74,.3)); }
  .chip.them { background:linear-gradient(180deg,rgba(150,52,52,.5),rgba(150,52,52,.28)); }

  .table { flex:1; position:relative; margin:6px 10px 10px; border-radius:26px;
    background:radial-gradient(ellipse at 50% 42%, var(--felt) 0%, var(--felt-dk) 80%);
    border:1px solid #6b4a26; box-shadow:inset 0 0 80px rgba(0,0,0,.5), 0 12px 40px rgba(0,0,0,.6);
    min-height:560px; overflow:hidden; transition:box-shadow .4s; }
  .table.flash { box-shadow:inset 0 0 120px rgba(201,162,63,.5), 0 12px 40px rgba(0,0,0,.6); }

  .infoTop { position:absolute; top:10px; left:12px; display:flex; flex-direction:column; gap:6px; z-index:6; max-width:46%; }
  .roundBadge { font-size:12px; font-weight:700; color:#1a1305; background:var(--gold);
    padding:4px 11px; border-radius:13px; align-self:flex-start; font-family:'Helvetica Neue',sans-serif; }
  .pileBadge { display:flex; align-items:baseline; gap:5px; background:rgba(150,52,52,.7);
    padding:4px 11px; border-radius:12px; align-self:flex-start; }
  .pileBadge .n { font-size:20px; font-weight:700; color:#fff; } .pileBadge .l { font-size:9px; color:#f0d0d0;
    text-transform:uppercase; letter-spacing:1px; font-family:'Helvetica Neue',sans-serif; }
  .trumpBadge { position:absolute; top:10px; right:12px; display:flex; align-items:center; gap:6px;
    background:var(--cream); padding:5px 11px; border-radius:20px; z-index:7; box-shadow:0 2px 8px rgba(0,0,0,.4); }
  .trumpBadge .l { font-size:8px; text-transform:uppercase; letter-spacing:1px; color:#8a784e; font-weight:700; font-family:'Helvetica Neue',sans-serif; }
  .trumpBadge .s { font-size:20px; font-weight:700; } .trumpBadge .h { font-size:12px; color:#8a784e; font-style:italic; }

  .seat { position:absolute; display:flex; flex-direction:column; align-items:center; gap:3px; z-index:5; }
  .seat.top { top:54px; left:50%; transform:translateX(-50%); }
  .seat.left { left:10px; top:46%; transform:translateY(-50%); }
  .seat.right { right:10px; top:46%; transform:translateY(-50%); }
  .avatar { width:42px; height:42px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#3a4a44,#232f2b); border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:var(--cream);
    box-shadow:0 3px 10px rgba(0,0,0,.5); }
  .seat.active .avatar { box-shadow:0 0 0 3px var(--gold), 0 3px 10px rgba(0,0,0,.5); animation:pulse 1.2s ease-in-out infinite; }
  .seat .nm { font-size:12px; color:#dce7e0; } .seat .meta { font-size:10px; color:var(--gold); font-style:italic; min-height:13px; }
  .seat .down { display:flex; align-items:center; }
  .miniBack { width:14px; height:20px; border-radius:3px; margin-left:-9px;
    background:repeating-linear-gradient(45deg,#8e2424,#8e2424 3px,#5a1414 3px,#5a1414 6px); border:1px solid #3a0e0e; }
  .miniBack:first-child { margin-left:0; } .seat .cnt { font-size:10px; color:#9bb3a8; margin-left:5px; font-family:'Helvetica Neue',sans-serif; }
  .discon { opacity:.45; }

  .feltMsg { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width:200px;
    text-align:center; font-size:13px; color:#eaf2ec; font-style:italic; line-height:1.4; z-index:2;
    text-shadow:0 1px 3px rgba(0,0,0,.6); padding:0 8px; }

  .played { position:absolute; width:50px; height:70px; background:linear-gradient(160deg,#fffdf6,var(--cream));
    border-radius:9px; box-shadow:0 5px 14px rgba(0,0,0,.5); border:1px solid #e0d3ad;
    display:flex; align-items:center; justify-content:center; transition:box-shadow .2s, transform .2s, opacity .2s; }
  .played .pip { font-size:22px; } .played .c-tl { position:absolute; top:4px; left:5px; font-size:11px; font-weight:700; line-height:1; text-align:center; }
  .played .c-br { position:absolute; bottom:4px; right:5px; font-size:11px; font-weight:700; line-height:1; text-align:center; transform:rotate(180deg); }
  .played.win { box-shadow:0 0 0 3px var(--gold), 0 0 22px 6px rgba(201,162,63,.85); z-index:9; }
  .played.lose { opacity:.4; }
  .played.faceDown { background:repeating-linear-gradient(45deg,#7a1f1f,#7a1f1f 5px,#5a1414 5px,#5a1414 10px); border:1px solid #3a0e0e; }
  .played.faceDown .fdtext { font-size:9px; color:#f3d9d9; font-style:italic; }
  .p-top { top:18%; left:50%; transform:translateX(-50%); } .p-bottom { bottom:20%; left:50%; transform:translateX(-50%); }
  .p-left { left:20%; top:50%; transform:translateY(-50%); } .p-right { right:20%; top:50%; transform:translateY(-50%); }

  .youArea { position:absolute; bottom:8px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:6px; z-index:8; }
  .youTag { font-size:12px; color:var(--gold); letter-spacing:1.5px; font-style:italic; min-height:15px; text-transform:uppercase; font-family:'Helvetica Neue',sans-serif; }
  .fan { display:flex; justify-content:center; padding-bottom:4px; flex-wrap:nowrap; }
  .card { width:50px; height:72px; background:linear-gradient(160deg,#fffdf6,var(--cream)); border-radius:9px;
    border:1px solid #e0d3ad; display:flex; align-items:center; justify-content:center; position:relative;
    box-shadow:0 4px 10px rgba(0,0,0,.45); margin-left:-20px; transition:transform .15s, box-shadow .15s; padding:0; }
  .card:first-child { margin-left:0; }
  .card .pip { font-size:22px; } .card .c-tl { position:absolute; top:3px; left:4px; font-size:11px; font-weight:700; line-height:1; text-align:center; }
  .card .c-br { position:absolute; bottom:3px; right:4px; font-size:11px; font-weight:700; line-height:1; text-align:center; transform:rotate(180deg); }
  .card.playable { box-shadow:0 0 0 2px var(--gold), 0 5px 12px rgba(0,0,0,.5); }
  .card.playable:active { transform:translateY(-8px); }
  .card.dimmed { opacity:.45; filter:grayscale(.4); }

  /* bidding / trump pick controls */
  .controls { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); z-index:20;
    background:linear-gradient(180deg,rgba(16,26,22,.97),rgba(10,18,15,.97)); padding:13px 16px; border-radius:15px;
    border:1px solid var(--gold); display:flex; flex-direction:column; align-items:center; gap:9px; box-shadow:0 12px 40px rgba(0,0,0,.7); max-width:300px; }
  .controls .ttl { font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--gold); font-family:'Helvetica Neue',sans-serif; }
  .bidgrid { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; max-width:270px; }
  .bidbtn { width:38px; height:38px; font-size:16px; font-weight:700; background:linear-gradient(180deg,#fffdf6,var(--cream)); color:var(--ink);
    border:1px solid #e0d3ad; border-radius:9px; }
  .passbtn { background:transparent; color:#d2c184; border:1px solid #6c5a2f; padding:8px 20px; border-radius:9px; font-family:'Helvetica Neue',sans-serif; }
  .resetTop { background:rgba(142,36,36,.24); color:#ffd6cf; border:1px solid rgba(255,160,145,.5);
    padding:7px 10px; border-radius:10px; font-size:11px; font-weight:700; font-family:'Helvetica Neue',sans-serif; white-space:nowrap; }

  /* center trump picker */
  .trumpPickPanel { position:absolute; inset:0; z-index:22; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:22px 14px; background:radial-gradient(ellipse at 50% 44%,rgba(15,93,74,.68),rgba(5,10,8,.78));
    pointer-events:none; }
  .trumpPickTitle { font-size:18px; color:var(--gold); font-weight:700; font-style:italic; text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.75); }
  .trumpPickSub { font-size:12px; color:#dce7e0; text-align:center; max-width:280px; line-height:1.35; }
  .trumpPickCards { display:flex; gap:10px; justify-content:center; align-items:center; flex-wrap:nowrap; pointer-events:auto; }
  .trumpPickBtn { background:none; border:none; padding:0; }
  .card.trumpPickCard { width:76px; height:108px; margin-left:0; border-radius:13px; }
  .card.trumpPickCard .pip { font-size:36px; }
  .card.trumpPickCard .c-tl,.card.trumpPickCard .c-br { font-size:15px; }
  .card.trumpPickCard:active { transform:translateY(-10px) scale(1.04); }
  @media (max-width:430px) { .trumpPickCards { gap:6px; } .card.trumpPickCard { width:64px; height:92px; } }

  /* overlays */
  .overlay { position:absolute; inset:0; background:rgba(5,10,8,.86); display:flex; align-items:center; justify-content:center;
    z-index:30; backdrop-filter:blur(3px); }
  .ocard { background:linear-gradient(180deg,#1a2b25,#11201b); border:1px solid var(--gold); border-radius:18px;
    padding:26px 24px; text-align:center; max-width:340px; display:flex; flex-direction:column; gap:14px; box-shadow:0 20px 60px rgba(0,0,0,.7); }
  .ocard .t { font-size:18px; color:var(--gold); font-style:italic; line-height:1.4; }
  .ocard .s { font-size:14px; color:#cdd9d0; }
  .obtns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }

  /* trump flip */
  .flipOverlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:25; pointer-events:none; }
  .flipScene { display:flex; flex-direction:column; align-items:center; gap:18px; perspective:1200px; animation:flipScene 3.4s ease forwards; }
  .flipCard { position:relative; width:150px; height:210px; transform-style:preserve-3d; }
  .flipInner { position:absolute; inset:0; transform-style:preserve-3d; animation:trumpFlip 3.4s cubic-bezier(.2,.8,.3,1) forwards; }
  .flipBack,.flipFront { position:absolute; inset:0; border-radius:14px; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border:3px solid var(--gold); display:flex; align-items:center; justify-content:center; box-shadow:0 18px 50px rgba(0,0,0,.75); }
  .flipBack { background:repeating-linear-gradient(45deg,#8e2424,#8e2424 7px,#5a1414 7px,#5a1414 14px); }
  .flipBack span { font-size:40px; font-weight:700; color:var(--gold); font-style:italic; text-shadow:0 2px 4px rgba(0,0,0,.6); }
  .flipFront { transform:rotateY(180deg); background:linear-gradient(160deg,#fffdf6,var(--cream)); }
  .flipFront .c-tl { position:absolute; top:8px; left:11px; font-size:26px; font-weight:700; line-height:1; text-align:center; }
  .flipFront .c-br { position:absolute; bottom:8px; right:11px; font-size:26px; font-weight:700; line-height:1; text-align:center; transform:rotate(180deg); }
  .flipFront .pip { font-size:80px; }
  .flipLabel { font-size:20px; font-weight:700; letter-spacing:1.5px; color:var(--cream); text-shadow:0 2px 10px rgba(0,0,0,.95);
    font-style:italic; opacity:0; animation:flipLabelIn .5s ease 1.9s forwards; }

  /* skip ritual stage */
  .skipStage { position:relative; width:94%; max-width:360px; height:80vh; max-height:640px; border-radius:18px; overflow:hidden;
    border:2px solid var(--gold); box-shadow:0 16px 50px rgba(0,0,0,.7); }
  .skipBg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .skipScrim { position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg,rgba(5,10,8,.55) 0%,rgba(5,10,8,.25) 35%,rgba(5,10,8,.8) 100%); }
  .skipContent { position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:18px 14px; text-align:center; }
  .skipInstruct { font-size:13px; color:var(--cream); font-style:italic; text-shadow:0 1px 4px rgba(0,0,0,.9); margin-top:6px; max-width:300px; }
  .skipRow { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; align-items:center; flex:1; width:100%; }
  .skipPlayer { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .skipBtn { background:linear-gradient(180deg,var(--gold),#a8842c); color:#1a1305; border:none; padding:10px 16px;
    font-size:13px; font-weight:700; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.5); position:relative; z-index:5;
    min-width:118px; text-align:center; white-space:nowrap; letter-spacing:.5px; touch-action:manipulation;
    transition:transform .14s cubic-bezier(.2,.8,.3,1.3); }
  .skipBtn.done { background:rgba(40,90,70,.9); color:#bfe6d4; border:1px solid #2e6b52; }
  .skipBtn.waiting { opacity:.85; }
  .skipName { font-size:10px; color:#cdd9d0; }

  @keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(201,162,63,.5); } 50% { box-shadow:0 0 0 7px rgba(201,162,63,0); } }
  @keyframes trumpFlip { 0%{transform:rotateY(0)} 8%{transform:rotateY(0)} 34%{transform:rotateY(200deg)} 42%{transform:rotateY(170deg)} 50%{transform:rotateY(180deg)} 100%{transform:rotateY(180deg)} }
  @keyframes flipScene { 0%{transform:scale(.7);opacity:0} 8%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:1} 88%{transform:scale(1.06);opacity:1} 100%{transform:scale(.92);opacity:0} }
  @keyframes flipLabelIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce) { .seat.active .avatar,.flipInner,.flipScene{animation:none} .flipInner{transform:rotateY(180deg)} }

  .connbar { position:fixed; top:0; left:0; right:0; background:#8e2424; color:#fff; text-align:center; font-size:12px;
    padding:6px; z-index:100; font-family:'Helvetica Neue',sans-serif; }

  /* match point */
  .table.matchPoint { animation: matchPulse 1.4s ease-in-out infinite; }
  @keyframes matchPulse { 0%,100% { box-shadow:inset 0 0 0 0 rgba(184,51,43,0), inset 0 0 80px rgba(0,0,0,.5), 0 12px 40px rgba(0,0,0,.6); } 50% { box-shadow:inset 0 0 0 4px rgba(184,51,43,.85), inset 0 0 80px rgba(0,0,0,.5), 0 12px 40px rgba(0,0,0,.6); } }
  .mpBadge { position:absolute; top:44px; left:50%; transform:translateX(-50%); z-index:12; display:flex; align-items:center; gap:7px;
    background:linear-gradient(180deg,#b8332b,#8e2424); color:#fff; font-size:11px; font-weight:700; letter-spacing:1px; padding:5px 13px;
    border-radius:16px; text-transform:uppercase; font-family:'Helvetica Neue',sans-serif; box-shadow:0 3px 12px rgba(0,0,0,.5); white-space:nowrap; }
  .mpDot { width:8px; height:8px; border-radius:50%; background:#ffd0c0; box-shadow:0 0 8px #ff7a5a; }

  /* scoop burst */
  .scoopOverlay { position:absolute; inset:0; z-index:24; pointer-events:none; overflow:hidden; }
  .scoopBurst { position:absolute; display:flex; flex-direction:column; align-items:center; gap:2px; animation:scoopPop 1.4s cubic-bezier(.2,.9,.3,1.2) forwards; }
  .scoopBurst.sc-bottom { bottom:22%; left:50%; transform:translateX(-50%); }
  .scoopBurst.sc-top { top:20%; left:50%; transform:translateX(-50%); }
  .scoopBurst.sc-left { left:22%; top:50%; transform:translateY(-50%); }
  .scoopBurst.sc-right { right:22%; top:50%; transform:translateY(-50%); }
  .scoopText { font-size:36px; font-weight:900; color:#ffd24a; font-style:italic; letter-spacing:1px;
    text-shadow:0 0 18px rgba(255,180,40,.9), 0 3px 6px rgba(0,0,0,.7); font-family:'Helvetica Neue',sans-serif; }
  .scoopCount { font-size:18px; font-weight:700; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.8); }
  @keyframes scoopPop { 0% { transform:scale(.3); opacity:0; } 25% { transform:scale(1.25); opacity:1; } 45% { transform:scale(1); } 80% { opacity:1; } 100% { transform:scale(1.1) translateY(-18px); opacity:0; } }

  /* shuffle */
  .shuffleOverlay { position:absolute; inset:0; z-index:26; display:flex; align-items:center; justify-content:center;
    background:rgba(5,10,8,.82); backdrop-filter:blur(3px); }
  .shuffleBox { display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; padding:10px 22px; }
  .shuffleDeck { position:relative; width:120px; height:110px; }
  .shf { position:absolute; top:25px; left:42px; width:44px; height:62px; border-radius:7px; display:block;
    background:repeating-linear-gradient(45deg,#8e2424,#8e2424 5px,#5a1414 5px,#5a1414 10px); border:1px solid #c9a23f; box-shadow:0 3px 8px rgba(0,0,0,.5); }
  .shfA { animation:shf1 .7s ease-in-out infinite; } .shfB { animation:shf2 .7s ease-in-out infinite; }
  .shfC { animation:shf3 .9s ease-in-out infinite; } .shfD { animation:shf4 .7s ease-in-out infinite; } .shfE { animation:shf5 .8s ease-in-out infinite; }
  @keyframes shf1 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(-46px,-10px) rotate(-16deg)} }
  @keyframes shf2 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(44px,-6px) rotate(14deg)} }
  @keyframes shf3 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(-30px,12px) rotate(-8deg)} }
  @keyframes shf4 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(34px,10px) rotate(10deg)} }
  @keyframes shf5 { 0%,100%{transform:translate(0,0) rotate(0)} 50%{transform:translate(0,-16px) rotate(3deg)} }
  .shuffleText { font-size:18px; color:#c9a23f; font-style:italic; font-weight:700; text-shadow:0 2px 8px rgba(0,0,0,.8); max-width:300px; }
  .shuffleSub { font-size:12px; color:#cdd9d0; font-style:italic; }
  @media (prefers-reduced-motion: reduce) { .table.matchPoint, .scoopBurst, .shf { animation:none; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================================
//  Band Rang — client. Talks to the authoritative server over WebSocket and
//  renders whatever state the server pushes. The server owns all rules.
// ============================================================================
"use strict";

const SUIT_SYMBOL = { S: "\u2660", H: "\u2665", D: "\u2666", C: "\u2663" };
const SUIT_NAME = { S: "Spades", H: "Hearts", D: "Diamonds", C: "Clubs" };
const RED = { H: true, D: true };
const RANK_WORD = { A:"Ace", K:"King", Q:"Queen", J:"Jack", "10":"Ten", "9":"Nine",
  "8":"Eight", "7":"Seven", "6":"Six", "5":"Five", "4":"Four", "3":"Three", "2":"Two" };
const TEAM_OF = (seat) => seat % 2;
const REQUIRED_DODGES = 12; // dodge 12 times, register on the 13th tap

const app = document.getElementById("app");
const connbar = document.getElementById("connbar");

// ---------------------------------------------------------------- persistent id
function loadStore() {
  try { return JSON.parse(localStorage.getItem("bandrang") || "{}"); } catch { return {}; }
}
function saveStore(o) { try { localStorage.setItem("bandrang", JSON.stringify(o)); } catch {} }
let store = loadStore();
if (!store.playerId) { store.playerId = Math.random().toString(36).slice(2); saveStore(store); }

// ---------------------------------------------------------------- websocket
let ws = null;
let state = null;            // latest server state
let joinInfo = null;         // { seat, isSpectator }
let lastError = "";
let wantReconnect = false;
let pingTimer = null;

// local-only animation flags (driven by diffing server state)
let prevTrumpActive = false;
let prevTrickLen = 0;
let flipUntil = 0;           // timestamp until which the trump-flip overlay shows
let highlightWinner = null;  // seat of last trick winner, for the brief card highlight
let highlightUntil = 0;
let prevPhase = null;
let scoopUntil = 0;          // timestamp until which the scoop burst shows
let scoopInfo = null;        // {seat,count} for the scoop burst
let prevScoopId = null;      // dedupe scoop events

function wsUrl() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  return proto + "//" + location.host;
}
function connect() {
  ws = new WebSocket(wsUrl());
  ws.onopen = () => {
    connbar.classList.add("hidden");
    startPing();
    // auto-rejoin if we were in a room
    if (store.code && joinInfo) {
      send({ type: "rejoin", code: store.code, playerId: store.playerId });
    }
  };
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    onMessage(m);
  };
  ws.onclose = () => {
    stopPing();
    if (wantReconnect) {
      connbar.classList.remove("hidden");
      setTimeout(connect, 1500);
    }
  };
  ws.onerror = () => { try { ws.close(); } catch {} };
}
function startPing() {
  stopPing();
  pingTimer = setInterval(() => { try { send({ type: "ping" }); } catch {} }, 20000);
}
function stopPing() { if (pingTimer) clearInterval(pingTimer); pingTimer = null; }
function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

function onMessage(m) {
  switch (m.type) {
    case "pong": break;
    case "joined":
      joinInfo = { seat: m.seat, isSpectator: m.isSpectator };
      store.code = m.code; saveStore(store);
      wantReconnect = true;
      lastError = "";
      break;
    case "state":
      applyStateDiff(m);
      state = m;
      render();
      break;
    case "error":
      lastError = m.message || "Something went wrong.";
      render();
      break;
  }
}

// Detect transitions for client-side animations.
function applyStateDiff(next) {
  // trump just revealed -> show the dramatic flip
  if (next.trumpActive && !prevTrumpActive) {
    flipUntil = Date.now() + 3400;
    setTimeout(render, 3450);
  }
  prevTrumpActive = next.trumpActive;

  // a trick just completed (server briefly broadcasts a 4-card trick before clearing)
  if (next.trick && next.trick.length === 4 && prevTrickLen < 4) {
    // winner is computed server-side and shown in lastTrick after clear; we approximate
    // the highlight using the trick winner the server will report. We highlight on the
    // next state where lastTrick is set.
  }
  prevTrickLen = next.trick ? next.trick.length : 0;

  // lastTrick freshly set -> highlight the winning card for a moment
  if (next.lastTrick && (!state || !state.lastTrick ||
      JSON.stringify(next.lastTrick) !== JSON.stringify(state.lastTrick))) {
    highlightWinner = next.lastTrick.winner;
    highlightUntil = Date.now() + 900;
    setTimeout(render, 950);
  }

  // scoop event -> burst animation near the winner's seat
  if (next.lastScoop && next.lastScoop.id !== prevScoopId) {
    prevScoopId = next.lastScoop.id;
    scoopInfo = { seat: next.lastScoop.seat, count: next.lastScoop.count };
    scoopUntil = Date.now() + 1400;
    setTimeout(render, 1450);
  }

  prevPhase = state ? state.phase : null;
}

// ---------------------------------------------------------------- actions
function createRoom(name) { send({ type: "create", name, playerId: store.playerId }); }
function joinRoom(name, code) { send({ type: "join", name, code: code.toUpperCase(), playerId: store.playerId }); }
function spectate(name, code) { send({ type: "spectate", name, code: code.toUpperCase(), playerId: store.playerId }); }
function startGame() { send({ type: "start" }); }
function placeBid(amount) { send({ type: "bid", amount }); }
function pickTrump(cardId) { send({ type: "pickTrump", cardId }); }
function playCard(cardId) { send({ type: "play", cardId }); }
function nextHand() { send({ type: "nextHand" }); }
function newMatch() { send({ type: "newMatch" }); }
function sendSkip() { send({ type: "skip" }); }
function leaveRoom() {
  wantReconnect = false; joinInfo = null; state = null;
  store.code = null; saveStore(store);
  try { ws.close(); } catch {}
  connect();
  render();
}

// ---------------------------------------------------------------- render: lobby
function renderLobby() {
  const name = store.name || "";
  app.innerHTML = `
    <div class="lobby">
      <h1>Band Rang</h1>
      <p>Online multiplayer for 4 friends. Create a room, share the code, and play hidden-trump Court Piece together.</p>
      <div class="field">
        <label>Your name</label>
        <input id="nm" maxlength="16" placeholder="e.g. Aizad" value="${escapeHtml(name)}">
      </div>
      <button class="primary" id="createBtn">Create a room</button>
      <div class="divider">or join one</div>
      <div class="field">
        <label>Room code</label>
        <input id="cd" maxlength="4" placeholder="ABCD" style="text-transform:uppercase; letter-spacing:4px; font-size:20px;">
      </div>
      <button class="ghost" id="joinBtn">Join room</button>
      <button class="ghost" id="specBtn" style="border-color:#3a4d45; color:#9bb3a8;">Watch as spectator</button>
      <div class="err">${escapeHtml(lastError)}</div>
    </div>`;
  const nmEl = document.getElementById("nm");
  const cdEl = document.getElementById("cd");
  const remember = () => { store.name = nmEl.value.trim(); saveStore(store); };
  document.getElementById("createBtn").onclick = () => {
    const n = nmEl.value.trim(); if (!n) return flash("Enter your name first.");
    remember(); createRoom(n);
  };
  document.getElementById("joinBtn").onclick = () => {
    const n = nmEl.value.trim(); const c = cdEl.value.trim();
    if (!n) return flash("Enter your name first.");
    if (c.length !== 4) return flash("Room code is 4 letters.");
    remember(); joinRoom(n, c);
  };
  document.getElementById("specBtn").onclick = () => {
    const n = nmEl.value.trim() || "Spectator"; const c = cdEl.value.trim();
    if (c.length !== 4) return flash("Enter a room code to watch.");
    store.name = n; saveStore(store); spectate(n, c);
  };
}
function flash(msg) { lastError = msg; render(); }

// ---------------------------------------------------------------- render: waiting / lobby-in-room
function renderRoomLobby() {
  const s = state;
  const filled = s.players.filter(Boolean).length;
  const seatList = s.players.map((p, i) =>
    `<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;
      background:${p ? "rgba(15,93,74,.3)" : "rgba(255,255,255,.04)"};border:1px solid ${p ? "rgba(201,162,63,.3)" : "#2a3a34"};">
      <span style="width:22px;height:22px;border-radius:50%;background:#2a3a34;display:flex;align-items:center;justify-content:center;font-size:11px;">${i+1}</span>
      <span style="flex:1;text-align:left;font-size:14px;">${p ? escapeHtml(p.name) + (p.connected ? "" : " (away)") : "<i style='color:#6c8479'>empty</i>"}</span>
      ${s.you === i ? "<span style='font-size:10px;color:var(--gold);'>YOU</span>" : ""}
    </div>`).join("");
  app.innerHTML = `
    <div class="lobby">
      <h1>Room</h1>
      <div class="codebox">${escapeHtml(s.code)}</div>
      <p>Share this code with your friends. Seats fill in order.</p>
      <div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px;">${seatList}</div>
      <p style="font-size:13px;color:#9bb3a8;">${escapeHtml(s.message)}</p>
      ${filled === 4 && !s.isSpectator ? `<button class="primary" id="startBtn">Start the game</button>` : ""}
      <button class="ghost" id="leaveBtn" style="border-color:#3a4d45;color:#9bb3a8;">Leave room</button>
      <div class="err">${escapeHtml(lastError)}</div>
    </div>`;
  const sb = document.getElementById("startBtn"); if (sb) sb.onclick = startGame;
  document.getElementById("leaveBtn").onclick = leaveRoom;
}

// ---------------------------------------------------------------- render: table
// Map an absolute seat to a screen position relative to "me" (I'm always bottom).
function screenPos(seat, me) {
  if (me == null) me = 0; // spectators view from seat 0's perspective
  const rel = (seat - me + 4) % 4;
  return ["bottom", "left", "top", "right"][rel];
}

function cardFaceHtml(card, cls) {
  const color = RED[card.suit] ? "#d6453a" : "#16140f";
  return `<div class="${cls}" style="color:${color}">
    <span class="c-tl">${card.rank}<br>${SUIT_SYMBOL[card.suit]}</span>
    <span class="pip">${SUIT_SYMBOL[card.suit]}</span>
    <span class="c-br">${card.rank}<br>${SUIT_SYMBOL[card.suit]}</span>
  </div>`;
}

function renderTable() {
  const s = state;
  const me = s.you;
  const trumpFlipping = Date.now() < flipUntil;

  // seats other than me
  const otherSeats = [0,1,2,3].filter(seat => seat !== (me == null ? -1 : me));
  const seatsHtml = otherSeats.map(seat => {
    const p = s.players[seat];
    const pos = screenPos(seat, me);
    if (pos === "bottom") return ""; // that's my spot
    const active = (s.phase === "playing" && s.turn === seat) || (s.phase === "bidding" && s.bidTurn === seat);
    const cnt = s.handCounts[seat] || 0;
    let meta = "";
    if (s.phase === "bidding" && s.bids[seat] != null) meta = s.bids[seat] === "pass" ? "pass" : "bid " + s.bids[seat];
    else if (s.trumpHolder === seat && s.highBid) meta = "bid " + s.highBid.amount;
    const backs = Array.from({length: Math.min(cnt, 8)}).map(() => `<span class="miniBack"></span>`).join("");
    return `<div class="seat ${pos} ${active ? "active" : ""} ${p && !p.connected ? "discon" : ""}">
      <div class="avatar">${p ? escapeHtml(p.name[0] || "?").toUpperCase() : "?"}</div>
      <div class="nm">${p ? escapeHtml(p.name) : "—"}</div>
      <div class="meta">${meta}</div>
      <div class="down">${backs}<span class="cnt">${cnt}</span></div>
    </div>`;
  }).join("");

  // played cards in the center
  const trickSource = (s.trick && s.trick.length) ? s.trick : (s.lastTrick ? s.lastTrick.trick : []);
  const showWinner = s.lastTrick && Date.now() < highlightUntil ? s.lastTrick.winner : null;
  const playedHtml = trickSource.map(play => {
    const pos = screenPos(play.seat, me);
    const posCls = { bottom:"p-bottom", left:"p-left", top:"p-top", right:"p-right" }[pos];
    let extra = "";
    if (showWinner != null) extra = play.seat === showWinner ? "win" : "lose";
    if (play.faceDown) {
      return `<div class="played faceDown ${posCls} ${extra}"><span class="fdtext">hidden</span></div>`;
    }
    return cardFaceHtml(play.card, `played ${posCls} ${extra}`);
  }).join("");

  // my hand
  let handHtml = "";
  const pickingTrumpInCenter = s.phase === "pickTrump" && s.isMyTrumpPick;
  if (!pickingTrumpInCenter && !s.isSpectator && s.hand && s.hand.length) {
    handHtml = s.hand.map(c => {
      const legal = s.phase === "playing" && s.isMyTurn && (s.legal || []).includes(c.id);
      const usable = legal;
      const cls = "card " + (usable ? "playable" : (s.phase === "playing" && s.isMyTurn ? "dimmed" : ""));
      return `<button class="cardbtn" data-id="${c.id}" ${usable ? "" : "disabled"} style="background:none;border:none;padding:0;">
        ${cardFaceHtml(c, cls)}
      </button>`;
    }).join("");
  }

  // large center trump selection: only the bid winner sees these 5 cards as buttons.
  let trumpPickHtml = "";
  if (pickingTrumpInCenter && !s.isSpectator && s.hand && s.hand.length) {
    const pickCards = s.hand.map(c => `<button class="cardbtn trumpPickBtn" data-id="${c.id}">
      ${cardFaceHtml(c, "card trumpPickCard playable")}
    </button>`).join("");
    trumpPickHtml = `<div class="trumpPickPanel">
      <div class="trumpPickTitle">Choose your hidden trump card</div>
      <div class="trumpPickSub">Select one of your first five cards. The suit becomes trump and the exact card stays locked until reveal.</div>
      <div class="trumpPickCards">${pickCards}</div>
    </div>`;
  }

  // my label
  let youTag = "";
  if (s.isSpectator) youTag = "Spectating";
  else if (s.phase === "bidding" && s.canBidNow) youTag = "Your bid";
  else if (s.phase === "pickTrump" && s.isMyTrumpPick) youTag = "Pick your hidden trump card";
  else if (s.phase === "playing" && s.isMyTurn) youTag = "Your turn";

  // scores
  const usName = me != null ? (TEAM_OF(me) === 0 ? "Us" : "Them") : "T1";
  const themName = me != null ? (TEAM_OF(me) === 0 ? "Them" : "Us") : "T2";
  const usScore = me != null ? s.scores[TEAM_OF(me)] : s.scores[0];
  const themScore = me != null ? s.scores[1 - TEAM_OF(me)] : s.scores[1];

  // match point: within 8 of the 52 khoti threshold
  const margin = s.scores[0] - s.scores[1];
  const matchPoint = !s.khoti && Math.abs(margin) >= 44;
  const mpLeaderIsMine = me != null && (margin > 0 ? 0 : 1) === TEAM_OF(me);

  // scoop burst
  const scooping = Date.now() < scoopUntil && scoopInfo;
  const scoopPosCls = scooping ? { 0:"sc-bottom",1:"sc-left",2:"sc-top",3:"sc-right" }[screenPos(scoopInfo.seat, me)] : "";
  const canResetDuringPlay = !s.isSpectator && ["bidding", "pickTrump", "playing", "shuffling"].includes(s.phase);

  app.innerHTML = `
    <div class="topbar">
      <div><div class="brand">Band Rang</div><div class="roomtag">Room ${escapeHtml(s.code)}</div></div>
      <div class="scorebar">
        <div class="chip us"><span class="lbl">${usName}</span><span class="num">${usScore}</span></div>
        <div class="chip them"><span class="lbl">${themName}</span><span class="num">${themScore}</span></div>
        ${canResetDuringPlay ? `<button class="resetTop" id="resetTopBtn">Reset</button>` : ""}
      </div>
    </div>
    <div class="table ${trumpFlipping ? "flash" : ""} ${matchPoint ? "matchPoint" : ""}" id="table">
      ${matchPoint ? `<div class="mpBadge"><span class="mpDot"></span>MATCH POINT \u00b7 ${mpLeaderIsMine ? "your team" : (me!=null?"opponents":"a team")} need ${52 - Math.abs(margin)}</div>` : ""}
      ${s.phase === "shuffling" ? `
        <div class="shuffleOverlay">
          <div class="shuffleBox">
            <div class="shuffleDeck"><span class="shf shfA"></span><span class="shf shfB"></span><span class="shf shfC"></span><span class="shf shfD"></span><span class="shf shfE"></span></div>
            <div class="shuffleText">Please rukiye. Taha k waalid pii kar rahay hain, shukriya</div>
            <div class="shuffleSub">${s.shuffler != null && s.players[s.shuffler] ? escapeHtml(s.players[s.shuffler].name) + " is shuffling\u2026" : "Shuffling\u2026"}</div>
          </div>
        </div>` : ""}
      ${scooping ? `<div class="scoopOverlay"><div class="scoopBurst ${scoopPosCls}"><div class="scoopText">SCOOP!</div><div class="scoopCount">+${scoopInfo.count}</div></div></div>` : ""}
      <div class="trumpBadge">
        <span class="l">Trump</span>
        ${s.trumpActive
          ? `<span class="s" style="color:${RED[s.trump] ? "#d6453a":"#1a1a1a"}">${s.trumpCard ? s.trumpCard.rank+SUIT_SYMBOL[s.trumpCard.suit] : SUIT_SYMBOL[s.trump]}</span>`
          : `<span class="h">hidden</span>`}
      </div>
      <div class="infoTop">
        <span class="roundBadge">${s.phase === "bidding" ? "Bidding" : s.phase === "pickTrump" ? "Choosing trump" : s.phase === "shuffling" ? "Shuffling" : "Playing"}</span>
        ${s.pile > 0 ? `<span class="pileBadge"><span class="n">${s.pile}</span><span class="l">in pile</span></span>` : ""}
      </div>
      ${seatsHtml}
      ${playedHtml}
      ${(!trickSource.length && s.message && s.phase !== "shuffling" && !pickingTrumpInCenter) ? `<div class="feltMsg">${escapeHtml(s.message)}</div>` : ""}
      ${trumpPickHtml}
      ${renderControls()}
      <div class="youArea">
        <div class="youTag">${youTag}</div>
        <div class="fan">${handHtml}</div>
      </div>
      ${trumpFlipping ? renderFlip() : ""}
    </div>
    ${s.phase === "handover" ? renderHandover() : ""}`;

  // wire hand clicks
  document.querySelectorAll(".cardbtn").forEach(btn => {
    btn.onclick = () => {
      const id = btn.getAttribute("data-id");
      if (s.phase === "pickTrump" && s.isMyTrumpPick) pickTrump(id);
      else if (s.phase === "playing" && s.isMyTurn) playCard(id);
    };
  });
  // wire bid buttons
  document.querySelectorAll(".bidbtn").forEach(btn => {
    btn.onclick = () => placeBid(parseInt(btn.getAttribute("data-amt"), 10));
  });
  const passEl = document.getElementById("passBtn"); if (passEl) passEl.onclick = () => placeBid("pass");
  const resetTop = document.getElementById("resetTopBtn");
  if (resetTop) resetTop.onclick = () => { if (confirm("Reset the whole match back to the lobby?")) newMatch(); };

  // wire handover (skip ritual + deal/reset)
  wireHandover();
}

function renderControls() {
  const s = state;
  if (s.phase === "bidding" && s.canBidNow) {
    const floor = s.bidFloor;
    let grid = "";
    for (let n = floor; n <= 13; n++) grid += `<button class="bidbtn" data-amt="${n}">${n}</button>`;
    if (floor > 13) grid = `<div style="font-size:12px;color:#cdd9d0;">No higher bid possible.</div>`;
    return `<div class="controls">
      <div class="ttl">Your bid (${floor}\u201313)</div>
      <div class="bidgrid">${grid}</div>
      <button class="passbtn" id="passBtn">Pass</button>
    </div>`;
  }
  return "";
}

function renderFlip() {
  const s = state;
  const tc = s.trumpCard || { rank: "", suit: s.trump };
  const color = RED[tc.suit] ? "#d6453a" : "#16140f";
  const label = tc.rank ? `${RANK_WORD[tc.rank] || tc.rank} of ${SUIT_NAME[tc.suit]}` : SUIT_NAME[tc.suit];
  return `<div class="flipOverlay"><div class="flipScene">
    <div class="flipCard"><div class="flipInner">
      <div class="flipBack"><span>BR</span></div>
      <div class="flipFront" style="color:${color}">
        <span class="c-tl">${tc.rank}<br>${SUIT_SYMBOL[tc.suit]}</span>
        <span class="pip">${SUIT_SYMBOL[tc.suit]}</span>
        <span class="c-br">${tc.rank}<br>${SUIT_SYMBOL[tc.suit]}</span>
      </div>
    </div></div>
    <div class="flipLabel">TRUMP \u00b7 ${escapeHtml(label)}</div>
  </div></div>`;
}

// ---------------------------------------------------------------- handover + skip ritual
function renderHandover() {
  const s = state;
  if (s.khoti) {
    const youWin = s.you != null && TEAM_OF(s.you) === s.khoti.winners;
    return `<div class="overlay"><div class="ocard">
      <img src="${ROUND_IMG}" alt="" style="width:100%;max-width:230px;border-radius:12px;border:1px solid var(--gold);align-self:center;box-shadow:0 4px 16px rgba(0,0,0,.5);">
      <div class="t">${s.you == null ? (s.khoti.winners === 0 ? "Team 1" : "Team 2") + " win the match!" : (youWin ? "Your team wins the match!" : "Khoti! Your team lost the match.")}</div>
      <div class="s">Final margin: ${s.khoti.margin}</div>
      <div class="obtns">
        ${s.isSpectator ? "" : `<button class="primary" id="rematchBtn" style="width:auto;">New match</button>`}
      </div>
    </div></div>`;
  }

  // normal hand end -> the TKMKBSDA skip ritual, visible to everyone
  const loserTeam = s.loserTeam;
  const loserSeats = loserTeam == null ? [] : [0,1,2,3].filter(seat => TEAM_OF(seat) === loserTeam);
  const allSkipped = loserSeats.every(seat => s.skipsDone[seat]);
  const iAmLoser = s.you != null && loserTeam != null && TEAM_OF(s.you) === loserTeam;

  const buttons = loserSeats.map(seat => {
    const p = s.players[seat];
    const done = s.skipsDone[seat];
    const mine = s.you === seat;
    // Only MY own button is interactive & dodges. Others' buttons show status only.
    const cls = "skipBtn " + (done ? "done" : (mine ? "" : "waiting"));
    const txt = done ? "\u2713 TKMKBSDA" : "TKMKBSDA";
    return `<div class="skipPlayer">
      <button class="${cls}" data-seat="${seat}" ${mine && !done ? "" : "disabled"} style="${mine && !done ? "" : "cursor:default;"}">${txt}</button>
      <span class="skipName">${p ? escapeHtml(p.name) : "—"}</span>
    </div>`;
  }).join("");

  let instruct;
  if (allSkipped) instruct = "Done. Anyone can deal the next hand.";
  else if (iAmLoser) instruct = "Tap TKMKBSDA 13 times \u2014 everyone is watching.";
  else instruct = "The losing team must press TKMKBSDA to continue\u2026";

  return `<div class="overlay"><div class="skipStage">
    <img class="skipBg" src="${ROUND_IMG}" alt="">
    <div class="skipScrim"></div>
    <div class="skipContent">
      <div class="skipInstruct">${instruct}</div>
      <div class="skipRow">${buttons}</div>
      <div class="obtns">
        ${s.isSpectator ? "" : `<button class="primary" id="dealBtn" style="width:auto;opacity:${allSkipped?1:.4};cursor:${allSkipped?"pointer":"not-allowed"};" ${allSkipped?"":"disabled"}>Deal next hand</button>`}
      </div>
    </div>
  </div></div>`;
}

// dodge counter lives outside render so it survives re-renders during the same handover
let myDodges = 0;
let handoverKey = null;
function wireHandover() {
  const s = state;
  if (s.phase !== "handover") return;
  // reset dodge counter when a new handover begins
  const key = s.code + "|" + s.scores.join(",") + "|" + (s.loserTeam);
  if (key !== handoverKey) { handoverKey = key; myDodges = 0; }

  const rematch = document.getElementById("rematchBtn"); if (rematch) rematch.onclick = newMatch;
  const deal = document.getElementById("dealBtn"); if (deal) deal.onclick = nextHand;
  // my own dodging button
  const myBtn = document.querySelector('.skipBtn[data-seat="' + s.you + '"]');
  if (myBtn && !myBtn.disabled) {
    const flee = () => {
      const stage = myBtn.closest(".skipStage");
      if (!stage) return;
      const b = myBtn.getBoundingClientRect(), st = stage.getBoundingClientRect();
      // current resting offset already applied via transform; compute fresh slot bounds
      const style = myBtn.style.transform;
      let curX = 0, curY = 0;
      const mt = style.match(/translate\(([-\d.]+)px,\s*([-\d.]+)px\)/);
      if (mt) { curX = parseFloat(mt[1]); curY = parseFloat(mt[2]); }
      const restLeft = b.left - curX, restTop = b.top - curY;
      const margin = 8;
      const minX = st.left + margin - restLeft;
      const maxX = st.right - margin - b.width - restLeft;
      const minY = st.top + margin - restTop;
      const maxY = st.bottom - margin - b.height - restTop;
      const nx = minX + Math.random() * Math.max(1, maxX - minX);
      const ny = minY + Math.random() * Math.max(1, maxY - minY);
      myBtn.style.transform = `translate(${nx}px, ${ny}px)`;
    };
    const press = (e) => {
      if (myDodges < REQUIRED_DODGES) { e.preventDefault(); myDodges++; flee(); return; }
      sendSkip(); // 13th tap registers with the server -> broadcasts to everyone
    };
    myBtn.addEventListener("pointerdown", press);
    myBtn.addEventListener("mouseenter", () => { if (myDodges < REQUIRED_DODGES) flee(); });
    myBtn.addEventListener("click", (e) => e.preventDefault());
  }
}

// ---------------------------------------------------------------- top-level render
function render() {
  if (!state) { renderLobby(); return; }
  if (state.phase === "lobby") { renderRoomLobby(); return; }
  renderTable();
}

function escapeHtml(str) {
  return String(str == null ? "" : str)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// kick things off
connect();
render();

</script>
</body>
</html>
